<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05060a" />
    <meta name="description" content="Jeu 3D web infini white-label : sphère énergétique, combos exponentiels, power-ups. Rebranding en 1 minute." />
    <title>Infinite Brand Runner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #05060a;
        overscroll-behavior: none;
        touch-action: none;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #05060a;
        z-index: 9999;
        transition: opacity 0.45s ease;
        font-family: "Space Grotesk", system-ui, sans-serif;
      }
      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot .ring {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: #22d3ee;
        animation: bootspin 0.9s linear infinite;
        box-shadow: 0 0 24px rgba(34, 211, 238, 0.45);
      }
      #boot .label {
        color: rgba(255, 255, 255, 0.45);
        font-size: 12px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
      }
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="ring"></div>
      <div class="label">Chargement…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
